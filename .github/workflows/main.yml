 name: Self-Hosted CI/CD
 
on:
push:
branches:
- main
 
jobs:
build-and-push:
runs-on: self-hosted
 
permissions:
contents: read
packages: write
 
steps:
- name: Checkout repository
uses: actions/checkout@v4
 
- name: Show repo structure (debug)
run: ls -R
 
- name: Set up Docker Buildx
uses: docker/setup-buildx-action@v3
 
- name: Login to GHCR
uses: docker/login-action@v3
with:
registry: ghcr.io
username: ${{ github.actor }}
password: ${{ secrets.WEEK3T }}
 
# ---------------- BACKEND ----------------
- name: Build and Push Backend
uses: docker/build-push-action@v5
with:
context: .
file: ./Dockerfile
push: true
tags: |
ghcr.io/talal350/week3:latest
ghcr.io/talal350/week3:${{ github.sha }}
 
# ---------------- FRONTEND ----------------
- name: Build and Push Frontend
uses: docker/build-push-action@v5
with:
context: ./templates
file: ./templates/Dockerfile
push: true
tags: |
ghcr.io/talal350/week3-templates:latest
ghcr.io/talal350/week3-templates:${{ github.sha }}
 
deploy:
needs: build-and-push
runs-on: self-hosted
 
steps:
- name: Checkout code
uses: actions/checkout@v4
 
- name: Log in to GitHub Container Registry
run: echo "${{ secrets.WEEK3T }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
 
- name: Pull latest images
run: |
docker pull ghcr.io/talal350/week3:latest
docker pull ghcr.io/talal350/week3-templates:latest
 
- name: Run new containers
run: |
cd /home/cybersecurity/week3
docker-compose down
docker system prune -f
docker-compose up -d
